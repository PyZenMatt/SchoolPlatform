<div class="quiz-block bg-gray-50 p-4 rounded-lg my-4">
    <div class="question prose mb-4">
        {{ value.question }}
    </div>
    
    <div class="answers space-y-2">
        {% for answer in value.answers %}
            <div class="answer flex items-center space-x-2">
                <input type="radio" disabled 
                       class="w-4 h-4 text-blue-600">
                <span>{{ answer.text }}</span>
                {% if answer.correct %}
                    <span class="text-green-600 ml-2">✓</span>
                {% endif %}
            </div>
        {% endfor %}
    </div>
    
    {% if value.explanation %}
        <div class="explanation mt-4 p-3 bg-blue-50 rounded">
            {{ value.explanation }}
        </div>
    {% endif %}
</div>
