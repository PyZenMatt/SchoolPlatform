<div class="file-upload-block border-2 border-dashed border-gray-300 p-6 rounded-lg text-center my-4">
    <h3 class="font-bold mb-2">{{ value.prompt }}</h3>
    <div class="text-sm text-gray-600 mb-4">
        Formati consentiti: {{ value.allowed_extensions|join:", " }}
        <br>
        Dimensione massima: {{ value.max_size }}KB
    </div>
    <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition-colors">
        Carica File
    </button>
</div>
