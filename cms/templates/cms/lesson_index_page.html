{% extends "base.html" %}

{% block content %}
<div class="max-w-6xl mx-auto px-4">
    <h1 class="text-3xl font-bold my-8">Tutte le Lezioni</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% for lesson in lessons %}
        <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow">
            <h2 class="text-xl font-semibold mb-2">{{ lesson.title }}</h2>
            <p class="text-gray-600 mb-4">{{ lesson.content|truncatechars:120 }}</p>
            
            <div class="flex justify-between items-center">
                <span class="text-blue-600 font-bold">{{ lesson.price }} TC</span>
                <span class="text-sm text-gray-500">{{ lesson.duration }} minuti</span>
            </div>
            
            <div class="mt-4 border-t pt-3">
                <p class="text-sm">Insegnante: 
                    <span class="font-medium">{{ lesson.teacher.username }}</span>
                </p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
