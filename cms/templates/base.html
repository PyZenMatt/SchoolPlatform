{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %} - TeoArt</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 p-4 text-white">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-bold">TeoArt</a>
            <div class="flex items-center space-x-6">
                {% if request.user.is_authenticated %}
                <meta name="jwt-token" content="{{ request.session.jwt_token }}">
                    <div class="flex items-center space-x-2">
                        <span class="font-medium">Wallet:</span>
                        <div id="teocoin-balance" 
                             class="bg-blue-500 px-3 py-1 rounded-full cursor-pointer"
                             hx-get="{% url 'teocoin-balance' %}"
                             hx-trigger="every 30s"
                             hx-swap="innerHTML">
                            <teocoin-balance></teocoin-balance>
                        </div>
                    </div>
                {% endif %}
                <a href="/dashboard" class="hover:text-blue-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </a>
            </div>
        </div>
    </nav>
    
    <script src="{% static 'js/TeoCoinBalance.js' %}"></script>
    <main class="container mx-auto mt-8 p-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
