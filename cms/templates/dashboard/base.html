{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <!-- Sidebar -->
        <aside class="bg-white p-4 rounded-lg shadow">
            <div class="mb-4">
                <h3 class="text-lg font-semibold mb-2">{{ request.user.username }}</h3>
                <p class="text-sm text-gray-600">{{ request.user.get_role_display }}</p>
            </div>
            <nav class="space-y-2">
                <a href="{% url 'dashboard' %}" class="dashboard-link active">Panoramica</a>
                <a href="{% url 'transaction-history' %}" class="dashboard-link">Transazioni</a>
                <a href="{% url 'my-lessons' %}" class="dashboard-link">Le Mie Lezioni</a>
                {% if request.user.is_teacher %}
                <a href="{% url 'teacher-dashboard' %}" class="dashboard-link">Dashboard Insegnante</a>
                {% endif %}
            </nav>
        </aside>

        <!-- Contenuto Principale -->
        <main class="md:col-span-3">
            {% block dashboard_content %}{% endblock %}
        </main>
    </div>
</div>
{% endblock %}
