<div class="lesson-card bg-white rounded-lg shadow-md overflow-hidden">
    <div class="p-4">
        <h3 class="text-lg font-semibold">{{ lesson.title }}</h3>
        <div class="flex items-center justify-between mt-2">
            <span class="text-sm text-gray-600">
                Insegnante: {{ lesson.teacher.username }}
            </span>
            <span class="px-2 py-1 bg-blue-100 text-blue-800 rounded-full text-sm">
                {{ lesson.price }} TC
            </span>
        </div>
        <div class="mt-4">
            <a href="{% url 'lesson_detail' lesson.id %}" 
               class="text-blue-600 hover:underline">Vai alla lezione →</a>
        </div>
    </div>
</div>
